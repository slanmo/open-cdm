/*
 * This file was generated by the Gradle 'init' task.
 */

import com.clougence.gradle.AntlrBuildSupport

plugins {
    id 'java-library'
    id 'maven-publish'
}

repositories {
    mavenLocal()
    maven { url 'https://maven.aliyun.com/repository/public/' }
    mavenCentral()
}

Properties globalConfig = new Properties()
try (FileInputStream fis = new FileInputStream(new File(rootDir, "gradle.properties"))) {
    globalConfig.load(fis)
}

def configuredJavaVersion = JavaVersion.toVersion(globalConfig.getProperty("cg.lib.java.version"))
def configuredJavaLanguageVersion = JavaLanguageVersion.of(Integer.parseInt(globalConfig.getProperty("cg.lib.java.version")))

ext {
    ANTLR_VERSION = globalConfig.getProperty("cg.lib.antlr.version")
    JACKSON_VERSION = globalConfig.getProperty("cg.lib.jackson.version")
    MYBATISPLUS_VERSION = globalConfig.getProperty("cg.lib.mybatisplus.version")
    SPRINGBOOT_VERSION = globalConfig.getProperty("cg.lib.springboot.version")
    SPRING_VERSION = globalConfig.getProperty("cg.lib.spring.version")
    SLF4J_VERSION = globalConfig.getProperty("cg.lib.slf4j.version")
    HIKARICP_VERSION = globalConfig.getProperty("cg.lib.hikaricp.version")
    OKHTTP_VERSION = globalConfig.getProperty("cg.lib.okhttp.version")
    FASTJSON_VERSION = globalConfig.getProperty("cg.lib.fastjson.version")

    configureClougenceAntlrGrammar = { Map config ->
        tasks.named('generateGrammarSource', AntlrTask).configure { task -> AntlrBuildSupport.configureGrammarTask(project, task, config)
        }
        AntlrBuildSupport.wireGrammarTasks(project, ['generateGrammarSource'])
    }

    registerClougenceAntlrGrammarTask = { String taskName, Map config ->
        tasks.register(taskName, AntlrTask) { task -> AntlrBuildSupport.configureGrammarTask(project, task, config)
        }
    }

    wireClougenceAntlrTasks = { Object... taskRefs -> AntlrBuildSupport.wireGrammarTasks(project, taskRefs.flatten())
    }
}

group = 'com.cdmgr'
version = globalConfig.getProperty("cg.clouddm.main.version")
java.sourceCompatibility = configuredJavaVersion
java.targetCompatibility = configuredJavaVersion

dependencies {
    compileOnly "org.slf4j:slf4j-api:${SLF4J_VERSION}"
    compileOnly "com.fasterxml.jackson.core:jackson-databind:${JACKSON_VERSION}"
    compileOnly "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.13.4"

    // lombok
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'

    // test
    testImplementation 'junit:junit:4.12'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.30'
    testCompileOnly 'org.projectlombok:lombok:1.18.30'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

java {
    withSourcesJar()
    sourceCompatibility = configuredJavaVersion
    targetCompatibility = configuredJavaVersion
    toolchain {
        languageVersion = configuredJavaLanguageVersion
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.register('buildx') {
    dependsOn build
}
