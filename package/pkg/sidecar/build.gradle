/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'com.clougence.java-conventions'
    id 'distribution'
}

dependencies {
    implementation project(':boot-sidecar')
    implementation 'org.codehaus.plexus:plexus-classworlds:2.6.0'

    for (Project p : parent.allprojects) {
        if (p.name.startsWith("ds-") || p.name.startsWith("plus-") || p.name.startsWith("inner-")) {
            compileOnly p
        }
    }
}

description = 'pkg-sidecar'

tasks.register('tgz', Tar) {
    def envName = rootProject.getProperties().get("profile")
    if (envName == null || "" == envName) {
        return
    }

    def sidecarPath = "cgdm/sidecar"

    into("${sidecarPath}") {
        project.file("$buildDir/emptyFoldersRoot/logs").mkdirs()
        project.file("$buildDir/emptyFoldersRoot/data").mkdirs()
        from "$buildDir/emptyFoldersRoot"
    }
    into("${sidecarPath}/bin") {
        from "${buildDir}/../app.conf"
    }
    into("${sidecarPath}/bin") {
        filePermissions {
            unix(0755)
        }
        from "${buildDir}/../../bin"
    }
    into("${sidecarPath}/bin") {
        from configurations.runtimeClasspath { include "*plexus-classworlds*" }
    }
    into("${sidecarPath}/conf") {
        from "${buildDir}/../global_conf.properties"
        from "${buildDir}/../sidecar.properties"
        from "${buildDir}/../logback.xml"
        from "${buildDir}/../../java/java-security.properties"
    }
    into("${sidecarPath}/conf/ssl") {
        from "${buildDir}/../../ssl/server.crt"
    }
    into("${sidecarPath}/libs") {
        from configurations.runtimeClasspath { exclude "*plexus-classworlds*" }
    }
    into("${sidecarPath}/plugins") {
        for (Project p : parent.allprojects) {
            if (p.name.startsWith("ds-") || p.name.startsWith("plus-") || p.name.startsWith("inner-")) {
                from p.tasks.customFatJar.archiveFile
            }
        }
    }

    archiveFileName = "cgdm-sidecar.tar.gz"
    destinationDirectory = file("${buildDir}/dist")
    compression = Compression.GZIP
    from "${buildDir}/cgdm"
}
